<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; background: #0e0e10; display: flex; gap: 48px; padding: 48px; align-items: center; }
  .tile { width: 200px; height: 200px; background: #6750A4; display: flex; align-items: center; justify-content: center; }
  .squircle { border-radius: 46px; }
  .circle { border-radius: 50%; }
  svg { width: 100%; height: 100%; }
  .label { color: #aaa; font-family: sans-serif; font-size: 14px; text-align: center; margin-top: 10px; }
  .col { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
  <div class="col">
    <div class="tile squircle">
      <svg viewBox="0 0 108 108"><path fill="#ffffff" fill-rule="evenodd" d="M54,32 L78,54 L71,54 L71,78 L37,78 L37,54 L30,54 Z M49,78 L49,64 L59,64 L59,78 Z"/></svg>
    </div>
    <div class="label">squircle mask</div>
  </div>
  <div class="col">
    <div class="tile circle">
      <svg viewBox="0 0 108 108"><path fill="#ffffff" fill-rule="evenodd" d="M54,32 L78,54 L71,54 L71,78 L37,78 L37,54 L30,54 Z M49,78 L49,64 L59,64 L59,78 Z"/></svg>
    </div>
    <div class="label">circle mask</div>
  </div>
</body>
</html>
